version: '3'

dotenv: ["./.env", "./application.env"]

includes:
  local:
    taskfile: ./Taskfile.local.yml
    dotenv: ["./.env", "./application.env"]
  dev:
    taskfile: ./Taskfile.dev.yml
    dotenv: ["./.env", "./application.env"]
  production:
    taskfile: ./Taskfile.production.yml
    dotenv: ["./.env", "./application.env"]

tasks:
  status:
    desc: Check installation status of all required tools
    cmds:
      - |
        echo "Checking required tools..."
        for tool in java git task bun docker; do
          if command -v $tool &> /dev/null; then
            echo "OK $tool: $($tool --version 2>&1 | head -1)"
          else
            echo "MISSING $tool: Not installed"
          fi
        done
