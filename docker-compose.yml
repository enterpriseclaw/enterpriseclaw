version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: enterpriseclaw
      POSTGRES_USER: enterpriseclaw
      POSTGRES_PASSWORD: enterpriseclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterpriseclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
